name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  validate-windows-app:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run validation script
        shell: powershell
        run: |
          .\app\windows-agent\tests\validate.ps1

  powershell-lint:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $results = Invoke-ScriptAnalyzer -Path "app","scripts" -Recurse
          
          # Show all issues
          $results | Format-Table

          # Fail only on errors (ignore warnings)
          $errors = $results | Where-Object { $_.Severity -eq "Error" }

          if ($errors) {
            Write-Host "PowerShell lint errors found"
            exit 1
          }

  terraform-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init Dev
        working-directory: terraform/environments/dev
        run: terraform init -backend=false

      - name: Terraform Validate Dev
        working-directory: terraform/environments/dev
        run: terraform validate

      - name: Terraform Init QA
        working-directory: terraform/environments/qa
        run: terraform init -backend=false

      - name: Terraform Validate QA
        working-directory: terraform/environments/qa
        run: terraform validate

      - name: Terraform Init Prod
        working-directory: terraform/environments/prod
        run: terraform init -backend=false

      - name: Terraform Validate Prod
        working-directory: terraform/environments/prod
        run: terraform validate

  
